<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RobotOps - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
</head>
<body class="font-sans bg-slate-900 min-h-screen flex items-center justify-center">

  <!-- Background Pattern -->
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-800 via-slate-900 to-slate-950"></div>

  <!-- Login Card -->
  <div class="relative w-full max-w-md px-4">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-600/30">
        <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="10" rx="2"/>
          <circle cx="12" cy="5" r="2"/>
          <path d="M12 7v4"/>
          <circle cx="8" cy="16" r="1"/>
          <circle cx="16" cy="16" r="1"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">RobotOps</h1>
      <p class="text-slate-400 text-sm mt-1">Indoor Delivery Robot Control System</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-xl font-semibold text-slate-900 mb-1">Sign in</h2>
      <p class="text-sm text-slate-500 mb-6">Enter your credentials to access the control panel</p>

      <!-- Form -->
      <form>
        <div class="space-y-4">
          <!-- Email -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
            <input type="email" placeholder="operator@company.com" value="admin@robotops.io"
              class="w-full h-11 px-4 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
            <input type="password" placeholder="Enter your password" value="password123"
              class="w-full h-11 px-4 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
          </div>

          <!-- Remember + Forgot -->
          <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
              <input type="checkbox" checked class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
              Remember me
            </label>
            <a href="#" class="text-sm text-blue-600 hover:text-blue-700 font-medium">Forgot password?</a>
          </div>

          <!-- Error Message (hidden by default, shown for demo) -->
          <div class="hidden bg-red-50 border border-red-200 rounded-lg p-3 flex items-start gap-2">
            <svg class="w-5 h-5 text-red-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/>
            </svg>
            <p class="text-sm text-red-700">Invalid email or password. Please try again.</p>
          </div>

          <!-- Submit -->
          <button type="button" onclick="window.location.href='dashboard.html'"
            class="w-full h-11 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-lg transition-colors shadow-sm">
            Sign in
          </button>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="text-center mt-6">
      <p class="text-xs text-slate-500">
        <span class="inline-flex items-center gap-1">
          <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
          System Online
        </span>
        <span class="mx-2">|</span>
        v2.0.0
      </p>
    </div>
  </div>

</body>
</html>
