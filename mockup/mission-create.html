<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RobotOps - Create Mission</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
</head>
<body class="font-sans bg-slate-50 min-h-screen">

  <div id="sidebar"></div>
  <div class="ml-60">
    <div id="header"></div>

    <main class="p-6">

      <!-- Breadcrumb -->
      <div class="flex items-center gap-2 mb-6">
        <a href="missions.html" class="flex items-center gap-1 text-sm text-slate-500 hover:text-blue-600">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
          Missions
        </a>
        <svg class="w-4 h-4 text-slate-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
        <span class="text-sm font-medium text-slate-900">New Mission</span>
      </div>

      <!-- Form -->
      <div class="max-w-2xl">
        <div class="bg-white rounded-xl border border-slate-200 p-6">
          <h2 class="text-lg font-semibold text-slate-900 mb-6">Create New Mission</h2>

          <form class="space-y-5">
            <!-- Robot Selection -->
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Target Robot</label>
              <select class="w-full h-11 px-4 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                <option value="">Select a robot...</option>
                <option value="robot-01">Robot-01 (NAVIGATING - B1) - 78%</option>
                <option value="robot-02">Robot-02 (NAVIGATING - 1F) - 63%</option>
                <option value="robot-03">Robot-03 (IDLE - 1F) - 12% ⚠ Low Battery</option>
                <option selected value="robot-04">Robot-04 (IDLE - 1F) - 92%</option>
                <option value="robot-06">Robot-06 (PLANNING - 1F) - 70%</option>
              </select>
              <p class="text-xs text-slate-400 mt-1">Only online robots are shown</p>
            </div>

            <!-- Mission Type -->
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Mission Type</label>
              <div class="grid grid-cols-3 gap-3">
                <label class="relative flex items-center gap-3 p-3 border-2 border-blue-500 bg-blue-50 rounded-lg cursor-pointer">
                  <input type="radio" name="type" value="delivery" checked class="sr-only">
                  <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18m-6-6 6 6-6 6"/></svg>
                  </div>
                  <div>
                    <div class="text-sm font-medium text-slate-900">Delivery</div>
                    <div class="text-xs text-slate-500">Pickup → Dropoff</div>
                  </div>
                  <div class="absolute top-2 right-2 w-4 h-4 bg-blue-500 rounded-full flex items-center justify-center">
                    <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
                  </div>
                </label>
                <label class="flex items-center gap-3 p-3 border border-slate-200 rounded-lg cursor-pointer hover:border-slate-300">
                  <input type="radio" name="type" value="goto" class="sr-only">
                  <div class="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="2"/></svg>
                  </div>
                  <div>
                    <div class="text-sm font-medium text-slate-900">Go To</div>
                    <div class="text-xs text-slate-500">Single goal</div>
                  </div>
                </label>
                <label class="flex items-center gap-3 p-3 border border-slate-200 rounded-lg cursor-pointer hover:border-slate-300">
                  <input type="radio" name="type" value="return" class="sr-only">
                  <div class="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                  </div>
                  <div>
                    <div class="text-sm font-medium text-slate-900">Return</div>
                    <div class="text-xs text-slate-500">Go home</div>
                  </div>
                </label>
              </div>
            </div>

            <!-- Floor -->
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Floor</label>
              <select class="w-full h-11 px-4 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                <option>B1</option>
                <option selected>1F</option>
                <option>2F</option>
                <option>3F</option>
              </select>
            </div>

            <!-- Pickup / Dropoff -->
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Pickup Location</label>
                <select class="w-full h-11 px-4 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                  <option value="">Select pickup...</option>
                  <option>Lobby</option>
                  <option selected>Reception</option>
                  <option>Kitchen</option>
                  <option>Storage</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Dropoff Location</label>
                <select class="w-full h-11 px-4 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                  <option value="">Select dropoff...</option>
                  <option>Room-101</option>
                  <option>Room-102</option>
                  <option selected>Room-103</option>
                  <option>Room-105</option>
                  <option>Room-108</option>
                </select>
              </div>
            </div>

            <!-- Priority -->
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Priority</label>
              <div class="flex gap-3">
                <label class="flex items-center gap-2 px-4 py-2 border border-slate-200 rounded-lg cursor-pointer hover:border-slate-300">
                  <input type="radio" name="priority" value="low" class="w-4 h-4 text-blue-600">
                  <span class="text-sm text-slate-600">Low</span>
                </label>
                <label class="flex items-center gap-2 px-4 py-2 border-2 border-blue-500 bg-blue-50 rounded-lg cursor-pointer">
                  <input type="radio" name="priority" value="normal" checked class="w-4 h-4 text-blue-600">
                  <span class="text-sm font-medium text-slate-700">Normal</span>
                </label>
                <label class="flex items-center gap-2 px-4 py-2 border border-slate-200 rounded-lg cursor-pointer hover:border-slate-300">
                  <input type="radio" name="priority" value="high" class="w-4 h-4 text-blue-600">
                  <span class="text-sm text-amber-700 font-medium">High</span>
                </label>
                <label class="flex items-center gap-2 px-4 py-2 border border-slate-200 rounded-lg cursor-pointer hover:border-slate-300">
                  <input type="radio" name="priority" value="urgent" class="w-4 h-4 text-blue-600">
                  <span class="text-sm text-red-600 font-medium">Urgent</span>
                </label>
              </div>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-3 pt-4 border-t border-slate-200">
              <button type="button" onclick="document.getElementById('confirm-modal').classList.remove('hidden')"
                class="h-11 px-6 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-lg transition">
                Create Mission
              </button>
              <a href="missions.html" class="h-11 px-6 border border-slate-300 text-slate-700 text-sm font-medium rounded-lg hover:bg-slate-50 transition flex items-center">
                Cancel
              </a>
            </div>
          </form>
        </div>
      </div>

    </main>
  </div>

  <!-- Confirm Modal -->
  <div id="confirm-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="this.parentElement.classList.add('hidden')"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 mx-4">
      <h3 class="text-lg font-bold text-slate-900 mb-4">Confirm Mission</h3>
      <div class="bg-slate-50 rounded-lg p-4 mb-4 space-y-2 text-sm">
        <div class="flex justify-between"><span class="text-slate-500">Robot</span><span class="font-medium text-slate-700">Robot-04</span></div>
        <div class="flex justify-between"><span class="text-slate-500">Type</span><span class="font-medium text-slate-700">Delivery</span></div>
        <div class="flex justify-between"><span class="text-slate-500">Floor</span><span class="font-medium text-slate-700">1F</span></div>
        <div class="flex justify-between"><span class="text-slate-500">Route</span><span class="font-medium text-slate-700">Reception → Room-103</span></div>
        <div class="flex justify-between"><span class="text-slate-500">Priority</span><span class="font-medium text-slate-700">Normal</span></div>
      </div>
      <div class="flex gap-3">
        <button onclick="document.getElementById('confirm-modal').classList.add('hidden')" class="flex-1 h-10 border border-slate-300 text-slate-700 font-medium rounded-lg hover:bg-slate-50 text-sm">Cancel</button>
        <button onclick="window.location.href='robot-detail.html'" class="flex-1 h-10 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg text-sm">Confirm & Dispatch</button>
      </div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>initLayout('missions', 'Create Mission', 'New delivery mission');</script>
</body>
</html>
