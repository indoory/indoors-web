spring.application.name=indoory-backend
server.servlet.session.cookie.name=INDOORY_SESSION
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/indoory}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:indoory}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:indoory}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC
