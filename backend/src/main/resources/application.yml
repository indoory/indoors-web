spring:
  profiles:
    default: local

# 매 HTTP request 의 method/uri/status 를 backend.log 에 INFO 로 기록 → 사용자가
# "삭제 시도했는데 안 됨" 같은 보고 시 backend 까지 도달했는지 명확히 확인 가능.
# Spring 6 default 는 access log 꺼져있어 ERROR 만 보이고 정상 요청 흔적 0.
logging:
  level:
    org.springframework.web.servlet.DispatcherServlet: DEBUG
