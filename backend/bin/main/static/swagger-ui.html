<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Indoory Control API Docs</title>
    <link
      href="https://unpkg.com/swagger-ui-dist@5.32.0/swagger-ui.css"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        background: #eef4fb;
      }

      .topbar {
        display: none;
      }

      .swagger-ui .information-container {
        padding-top: 18px;
      }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5.32.0/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.32.0/swagger-ui-standalone-preset.js"></script>
    <script>
      window.ui = SwaggerUIBundle({
        url: "/v3/api-docs",
        dom_id: "#swagger-ui",
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        layout: "BaseLayout",
        displayRequestDuration: true,
        tryItOutEnabled: true,
      });
    </script>
  </body>
</html>
